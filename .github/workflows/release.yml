name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup target add ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        run: |
          cd target/${{ matrix.target }}/release
          tar czf skyfi-cli-${{ matrix.target }}.tar.gz skyfi-cli
          mv skyfi-cli-${{ matrix.target }}.tar.gz ../../../

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: skyfi-cli-${{ matrix.target }}
          path: skyfi-cli-${{ matrix.target }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            skyfi-cli-aarch64-apple-darwin/skyfi-cli-aarch64-apple-darwin.tar.gz
            skyfi-cli-x86_64-apple-darwin/skyfi-cli-x86_64-apple-darwin.tar.gz
            skyfi-cli-x86_64-unknown-linux-gnu/skyfi-cli-x86_64-unknown-linux-gnu.tar.gz
          generate_release_notes: true

  update-tap:
    needs: release
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Compute SHA256 checksums
        id: sha
        run: |
          echo "mac_arm64=$(sha256sum skyfi-cli-aarch64-apple-darwin/skyfi-cli-aarch64-apple-darwin.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "mac_x86_64=$(sha256sum skyfi-cli-x86_64-apple-darwin/skyfi-cli-x86_64-apple-darwin.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "linux_x86_64=$(sha256sum skyfi-cli-x86_64-unknown-linux-gnu/skyfi-cli-x86_64-unknown-linux-gnu.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Generate formula
        run: |
          cat > skyfi-cli.rb << 'FORMULA'
          class SkyfiCli < Formula
            desc "CLI for the SkyFi Platform API"
            homepage "https://github.com/ianzepp/skyfi-cli"
            version "${{ steps.version.outputs.version }}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/ianzepp/skyfi-cli/releases/download/${{ github.ref_name }}/skyfi-cli-aarch64-apple-darwin.tar.gz"
                sha256 "${{ steps.sha.outputs.mac_arm64 }}"
              else
                url "https://github.com/ianzepp/skyfi-cli/releases/download/${{ github.ref_name }}/skyfi-cli-x86_64-apple-darwin.tar.gz"
                sha256 "${{ steps.sha.outputs.mac_x86_64 }}"
              end
            end

            on_linux do
              url "https://github.com/ianzepp/skyfi-cli/releases/download/${{ github.ref_name }}/skyfi-cli-x86_64-unknown-linux-gnu.tar.gz"
              sha256 "${{ steps.sha.outputs.linux_x86_64 }}"
            end

            def install
              bin.install "skyfi-cli"
            end

            test do
              assert_match "skyfi-cli", shell_output("#{bin}/skyfi-cli --help")
            end
          end
          FORMULA

      - name: Push formula to tap
        uses: dmnemec/copy_file_to_another_repo_action@main
        env:
          API_TOKEN_GITHUB: ${{ secrets.TAP_GITHUB_TOKEN }}
        with:
          source_file: skyfi-cli.rb
          destination_repo: ianzepp/homebrew-tap
          destination_folder: Formula
          user_email: github-actions[bot]@users.noreply.github.com
          user_name: github-actions[bot]
          commit_message: "Update skyfi-cli to ${{ steps.version.outputs.version }}"
