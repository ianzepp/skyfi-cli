name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup target add ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        run: |
          cd target/${{ matrix.target }}/release
          tar czf skyfi-${{ matrix.target }}.tar.gz skyfi
          mv skyfi-${{ matrix.target }}.tar.gz ../../../

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: skyfi-${{ matrix.target }}
          path: skyfi-${{ matrix.target }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            skyfi-aarch64-apple-darwin/skyfi-aarch64-apple-darwin.tar.gz
            skyfi-x86_64-apple-darwin/skyfi-x86_64-apple-darwin.tar.gz
            skyfi-x86_64-unknown-linux-gnu/skyfi-x86_64-unknown-linux-gnu.tar.gz
          generate_release_notes: true

  update-tap:
    needs: release
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Compute SHA256 checksums
        id: sha
        run: |
          echo "mac_arm64=$(sha256sum skyfi-aarch64-apple-darwin/skyfi-aarch64-apple-darwin.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "mac_x86_64=$(sha256sum skyfi-x86_64-apple-darwin/skyfi-x86_64-apple-darwin.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "linux_x86_64=$(sha256sum skyfi-x86_64-unknown-linux-gnu/skyfi-x86_64-unknown-linux-gnu.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Generate formula
        run: |
          cat > skyfi.rb << 'FORMULA'
          class Skyfi < Formula
            desc "CLI for the SkyFi Platform API"
            homepage "https://github.com/ianzepp/skyfi-cli"
            version "${{ steps.version.outputs.version }}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/ianzepp/skyfi-cli/releases/download/${{ github.ref_name }}/skyfi-aarch64-apple-darwin.tar.gz"
                sha256 "${{ steps.sha.outputs.mac_arm64 }}"
              else
                url "https://github.com/ianzepp/skyfi-cli/releases/download/${{ github.ref_name }}/skyfi-x86_64-apple-darwin.tar.gz"
                sha256 "${{ steps.sha.outputs.mac_x86_64 }}"
              end
            end

            on_linux do
              url "https://github.com/ianzepp/skyfi-cli/releases/download/${{ github.ref_name }}/skyfi-x86_64-unknown-linux-gnu.tar.gz"
              sha256 "${{ steps.sha.outputs.linux_x86_64 }}"
            end

            def install
              bin.install "skyfi"
            end

            test do
              assert_match "Usage: skyfi", shell_output("#{bin}/skyfi --help")
            end
          end
          FORMULA

      - name: Push formula to tap
        uses: dmnemec/copy_file_to_another_repo_action@main
        env:
          API_TOKEN_GITHUB: ${{ secrets.TAP_GITHUB_TOKEN }}
        with:
          source_file: skyfi.rb
          destination_repo: ianzepp/homebrew-tap
          destination_folder: Formula
          user_email: github-actions[bot]@users.noreply.github.com
          user_name: github-actions[bot]
          commit_message: "Update skyfi to ${{ steps.version.outputs.version }}"
